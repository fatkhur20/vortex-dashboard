name: vortex_dashboard
description: A premium motorcycle/car dashboard application with GPS, compass, altimeter, and tracking features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  geolocator: ^11.0.0
  # compass implemented via sensors_plus
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  intl: ^0.19.0
  http: ^1.2.1
  path_provider: ^2.1.3
  sensors_plus: ^4.0.2
  geocoding: ^3.0.0
  latlong2: ^0.9.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  xml: ^6.5.0
  csv: ^6.0.0
  wakelock_plus: ^1.2.5
  flutter_local_notifications: ^17.2.1+2
  audioplayers: ^6.0.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/.gitkeep
    - assets/icons/.gitkeep
