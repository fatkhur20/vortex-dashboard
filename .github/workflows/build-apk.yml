name: Build Vortex Dashboard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Hive)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK (ARM32)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-universal
          path: build/app/outputs/flutter-apk/app-release.apk
