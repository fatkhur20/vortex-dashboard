name: Build Vortex Dashboard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable

    steps:
      - uses: actions/checkout@v4

      - name: Generate fresh project
        run: |
          flutter create --org com.vortex --project-name vortex_dashboard --platforms android fresh
          # Pin Gradle to 8.7+ and add Kotlin DSL plugin repository
          echo 'distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists' > fresh/android/gradle/wrapper/gradle-wrapper.properties
          # Add Gradle Plugin Portal to project settings
          cat > fresh/android/settings.gradle.kts << 'SETTINGSEOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "vortex_dashboard"
include(":app")
SETTINGSEOF
          # Global init script for Flutter SDK internal Gradle files
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'INITEOF'
settingsEvaluated { settings ->
    settings.pluginManagement {
        repositories {
            google()
            mavenCentral()
            gradlePluginPortal()
        }
    }
}
INITEOF

      - name: Generate app icon
        run: |
          mkdir -p fresh/assets/fonts fresh/assets/icons
          python3 .github/workflows/genicon.py

      - name: Copy Dart code & assets
        run: |
          cp -r lib/* fresh/lib/
          cp pubspec.yaml fresh/pubspec.yaml
          mkdir -p fresh/assets/fonts fresh/assets/icons
          [ -d assets ] && cp -r assets/. fresh/assets/ 2>/dev/null || true

      - name: Add Android permissions & Mapbox config
        run: MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} python3 .github/workflows/patch_manifest.py fresh/android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: cd fresh && flutter pub get

      - name: Bump compileSdk to 36 (app + plugins)
        run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' fresh/android/app/build.gradle.kts
          find /github/home/.pub-cache -path '*/mapbox_maps_flutter*/android/build.gradle' -exec sed -i 's/compileSdk [0-9][0-9]*/compileSdk 36/' {} + 2>/dev/null || true
          find /github/home/.pub-cache -path '*/flutter_plugin_android_lifecycle*/android/build.gradle' -exec sed -i 's/compileSdk [0-9][0-9]*/compileSdk 36/' {} + 2>/dev/null || true

      - name: Generate launcher icons
        run: cd fresh && dart run flutter_launcher_icons

      - name: Generate code (Hive)
        run: cd fresh && dart run build_runner build --delete-conflicting-outputs 2>&1

      - name: Build Debug APK
        run: cd fresh && flutter build apk --debug --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-debug
          path: fresh/build/app/outputs/flutter-apk/app-debug.apk

      - name: Build Release APK
        run: cd fresh && flutter build apk --release --split-per-abi --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Upload APK (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-arm64-v8a
          path: fresh/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK (ARM32)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-armeabi-v7a
          path: fresh/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-x86_64
          path: fresh/build/app/outputs/flutter-apk/app-x86_64-release.apk
