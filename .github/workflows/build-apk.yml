name: Build Vortex Dashboard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable

    steps:
      - uses: actions/checkout@v4

      - name: Generate fresh project
        run: flutter create --org com.vortex --project-name vortex_dashboard --platforms android fresh

      - name: Generate app icon
        run: |
          mkdir -p fresh/assets/fonts fresh/assets/icons
          if command -v convert &> /dev/null; then
            convert -size 1024x1024 xc:'#0a0f1e' fresh/assets/icon.png
          else
            python3 -c "
import struct, zlib
w=1024;h=1024;r=10;g=15;b=30
def c(t,d):
    return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
row=b'\x00'+bytes([r,g,b])*w
raw=row*h
open('fresh/assets/icon.png','wb').write(b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+c(b'IDAT',zlib.compress(raw))+c(b'IEND',b''))
"
          fi

      - name: Copy Dart code & assets
        run: |
          cp -r lib/* fresh/lib/
          cp pubspec.yaml fresh/pubspec.yaml
          mkdir -p fresh/assets/fonts fresh/assets/icons
          [ -d assets ] && cp -r assets/. fresh/assets/ 2>/dev/null || true

      - name: Install dependencies
        run: cd fresh && flutter pub get

      - name: Generate launcher icons
        run: cd fresh && dart run flutter_launcher_icons

      - name: Generate code (Hive)
        run: cd fresh && dart run build_runner build --delete-conflicting-outputs 2>&1

      - name: Build Debug APK
        run: cd fresh && flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-debug
          path: fresh/build/app/outputs/flutter-apk/app-debug.apk

      - name: Build Release APK
        run: cd fresh && flutter build apk --release --split-per-abi

      - name: Upload APK (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-arm64-v8a
          path: fresh/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK (ARM32)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-armeabi-v7a
          path: fresh/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: vortex-dashboard-x86_64
          path: fresh/build/app/outputs/flutter-apk/app-x86_64-release.apk
