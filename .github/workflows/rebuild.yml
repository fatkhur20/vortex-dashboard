name: Rebuild Circle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable

    steps:
      - uses: actions/checkout@v4

      - name: Generate fresh project
        run: |
          flutter create --org com.vortex --project-name vortex_dashboard --platforms android fresh

      - name: Build Debug APK (fresh template)
        run: |
          cd fresh
          flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vortex-fresh-template
          path: fresh/build/app/outputs/flutter-apk/app-debug.apk
