name: Build Test Minimal (Flutter 3.24.5)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Create and build minimal test app
        run: |
          flutter config --no-analytics
          flutter create --org com.vortex test_old
          cd test_old
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: true,
            home: Scaffold(appBar: AppBar(title: Text('Test')), body: Center(child: Text('Hello'))),
          ));
          EOF
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: test-minimal-old-flutter
          path: test_old/build/app/outputs/flutter-apk/app-release.apk
